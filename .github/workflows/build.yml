name: Build

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - run: npm install

      - run: npm run build

      - run: npm -w server install --omit=dev

      - uses: actions/upload-artifact@v4
        with:
          name: build
          path: |
            server/dist/
            server/public/
            server/node_modules/
